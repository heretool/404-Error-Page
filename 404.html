<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 Page Not Found - Heretool</title>
<meta name="description" content="Error 404: The celestial coordinates you are looking for have been completely devoured by a massive gravitational anomaly. Initiate space warp to escape.">
<meta name="robots" content="index, follow">
<style>
/* Layout Base Setup */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background-color: #020205; /* Matches canvas color to prevent white flashbangs on load */
    overflow: hidden;
}
#space {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
}
/* Foreground Floating UI Overlay */
.interface {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    padding: 40px;
    box-sizing: border-box;
    pointer-events: none; /* Passes cursor events straight down to the canvas underneath */
    perspective: 1000px;  /* Enables 3D text perspective distortion */
    transition: opacity 0.8s ease-in-out; /* Handles smooth fade-out during the warp exit */
}
.header {
    text-align: center;
    margin-top: 8vh;
    animation: fadeIn 2s ease-out;
    transform: rotateX(20deg) scaleY(1.05); /* Gives text a subtle cosmic dip slant */
    transform-origin: center bottom;
}
.error-code {
    font-size: 7.5rem;
    font-weight: 900;
    letter-spacing: 18px;
    background: #ffffff;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0px 5px 10px rgba(255, 78, 80, 0.4)) drop-shadow(0px 15px 25px rgba(255, 78, 80, 0.15));
    margin-bottom: 10px;
}
.error-msg {
    font-size: 1rem;
    color: #ffffff;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.9;
    filter: drop-shadow(0px 4px 8px rgba(255, 255, 255, 0.2));
}
.console {
    margin-bottom: 10vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: auto; /* Re-enables pointer input explicitly for interactive console controls */
}
.btn-home {
    position: relative;
    padding: 14px 30px;
    font-size: 0.95rem;
    color: #ffffff;
    background: #696cff;
    border: 1px solid #696cff;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: inset 0 0 10px rgba(105, 108, 255, 0.1);
}
.btn-home:hover {
    color: #fff;
    background: #5356ff;
    box-shadow: 0 0 25px rgba(105, 108, 255, 0.6);
}
@keyframes fadeIn {
from {
opacity: 0;
transform: translateY(-20px) rotateX(20deg);
}
to {
opacity: 1;
transform: translateY(0) rotateX(20deg);
}
}
</style>
</head>
<body>
<canvas id="space"></canvas>
<div class="interface" id="uiLayer">
  <div class="header" id="textHeader">
    <div class="error-code">404</div>
    <div class="error-msg">ERROR: The target page has been swallowed by a black hole.</div>
  </div>
  <div class="console" id="uiConsole">
    <button class="btn-home" onclick="triggerWarp()">Initiate Space Warp (Back to Home)</button>
  </div>
</div>
<script>
  const canvas = document.getElementById('space');
  const ctx = canvas.getContext('2d');

  let width, height;
  let blackHole = null;
  let particles = [];
  const maxParticles = 1400;  
  let isWarping = false;      // Global trigger tracking state change from "orbiting" to "warping"
  let warpProgress = 0;       

  function initCanvas() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      
      if (!blackHole) {
          blackHole = {
              x: width / 2,
              y: height / 2,
              radius: 45,            // Critical Event Horizon radius threshold
              gravity: 0.15,         
              accretionRadius: 200   
          };
      } else {
          blackHole.x = width / 2;
          blackHole.y = height / 2;
      }
  }
  initCanvas();
  window.addEventListener('resize', initCanvas);

  let targetX = width / 2;
  let targetY = height / 2;

  function updateTargetPointer(clientX, clientY) {
      if (isWarping) return; // Locks mouse interactions instantly once warp cycle fires
      targetX = width / 2 + (clientX - width / 2) * 0.08; // Adds lag easing to pointer track
      targetY = height / 2 + (clientY - height / 2) * 0.08;
  }

  window.addEventListener('mousemove', (e) => updateTargetPointer(e.clientX, e.clientY));
  window.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0) updateTargetPointer(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });

  class Particle {
      constructor() {
          const angle = Math.random() * Math.PI * 2;
          const distance = Math.random() * (Math.max(width, height) * 0.5) + blackHole.radius;
          
          this.x = blackHole.x + Math.cos(angle) * distance;
          this.y = blackHole.y + Math.sin(angle) * distance;
          this.size = Math.random() * 1.5 + 0.4;
          this.history = []; 
          this.colorArr = Math.random() > 0.35 ? [255, 130, 35] : [79, 172, 254]; 
          this.alive = true;
      }

      update() {
          const dx = blackHole.x - this.x;
          const dy = blackHole.y - this.y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          // Hard interception rule: vaporize elements instantly if they touch the event horizon rim
          if (distance <= blackHole.radius + 1) {
              this.alive = false; 
              return;
          }

          this.history.push({ x: this.x, y: this.y });
          
          const maxHistoryLength = isWarping ? 12 : Math.floor(Math.min(8, 2 + (blackHole.accretionRadius / distance) * 3));
          if (this.history.length > maxHistoryLength) {
              this.history.shift();
          }

          const angle = Math.atan2(dy, dx);

          if (isWarping) {
              // Action Speed Logic: Linear straight acceleration towards singularity core
              const warpSpeed = 4 + warpProgress * 20; 
              this.x += Math.cos(angle) * warpSpeed;
              this.y += Math.sin(angle) * warpSpeed;
          } else {
              // Standard Mode Physics: Balances circular momentum against pull vectors
              let currentGravity = blackHole.gravity;
              let currentOrbitBase = 0.7;
              const force = (currentGravity * 40) / (distance * 0.05);
              const orbitSpeed = (currentOrbitBase / (distance * 0.01) + 0.005); 
              const rotateOffset = 0.04; 

              this.x += Math.cos(angle + Math.PI / 2 - rotateOffset) * orbitSpeed * distance * 0.1 + Math.cos(angle) * force;
              this.y += Math.sin(angle + Math.PI / 2 - rotateOffset) * orbitSpeed * distance * 0.1 + Math.sin(angle) * force;
          }

          // Gravitational Redshift Color Shift: Fades color down to dark thermal reds near core
          const ratio = Math.min(1, distance / blackHole.accretionRadius);
          const r = Math.floor(255 * (1 - ratio) + this.colorArr[0] * ratio);
          const g = Math.floor(90 * (1 - ratio) + this.colorArr[1] * ratio);
          const b = Math.floor(20 * (1 - ratio) + this.colorArr[2] * ratio);
          this.color = `rgba(${r}, ${g}, ${b}, ${Math.random() * 0.3 + 0.7})`;
      }

      draw() {
          if (this.history.length < 2) return;

          ctx.beginPath();
          ctx.moveTo(this.history[0].x, this.history[0].y);
          for (let i = 1; i < this.history.length; i++) {
              ctx.lineTo(this.history[i].x, this.history[i].y);
          }
          ctx.lineTo(this.x, this.y);

          ctx.strokeStyle = this.color;
          ctx.lineWidth = this.size;
          ctx.lineCap = 'round';
          ctx.stroke();
      }
  }

  for (let i = 0; i < maxParticles; i++) {
      particles.push(new Particle());
  }

  function animate() {
      // Background redraw using low opacity creates natural glowing trails behind moving stars
      ctx.fillStyle = 'rgba(2, 2, 5, 0.25)';
      ctx.fillRect(0, 0, width, height);

      blackHole.x += (targetX - blackHole.x) * 0.05;
      blackHole.y += (targetY - blackHole.y) * 0.05;

      if (isWarping) {
          warpProgress += 0.012; 
          blackHole.accretionRadius += (blackHole.radius - blackHole.accretionRadius) * 0.08; // Collapses disk light ring

          // Completion Criterion: Routes backward to index once dust matter has cleared down to zero thresholds
          if (particles.length <= 15 || warpProgress >= 1.0) {
              window.location.href = '/'; 
              return; 
          }
      }

      // 1. Accretion Photon Glow Core Radial Gradient Layers
      let outerRadius = Math.max(blackHole.radius + 2, blackHole.accretionRadius);
      const grad = ctx.createRadialGradient(
          blackHole.x, blackHole.y, blackHole.radius, 
          blackHole.x, blackHole.y, outerRadius
      );
      grad.addColorStop(0, 'rgba(255, 255, 255, 1)');      
      grad.addColorStop(0.1, 'rgba(255, 90, 0, 0.9)');     
      grad.addColorStop(0.4, 'rgba(112, 0, 20, 0.6)');   
      grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(blackHole.x, blackHole.y, outerRadius, 0, Math.PI * 2);
      ctx.fill();

      // 2. Lifecycle Filter, Particle Pipeline Calculations
      particles = particles.filter(p => p.alive);
      if (!isWarping) {
          while (particles.length < maxParticles) {
              particles.push(new Particle());
          }
      }
      particles.forEach(p => { p.update(); p.draw(); });

      // 3. Absolute Abyss Core Singularity Rendering Layer
      ctx.fillStyle = '#000000';
      ctx.shadowBlur = isWarping ? 0 : 40; 
      ctx.shadowColor = '#000000';
      ctx.beginPath();
      ctx.arc(blackHole.x, blackHole.y, blackHole.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0; 

      requestAnimationFrame(animate);
  }
  animate();

  function triggerWarp() {
      if (isWarping) return; 
      isWarping = true;
      
      targetX = width / 2; // Anchors gravity grid back cleanly to symmetrical center
      targetY = height / 2;

      const uiLayer = document.getElementById('uiLayer');
      uiLayer.style.opacity = '0';
      uiLayer.style.pointerEvents = 'none'; 
  }
</script>
</body>
</html>
